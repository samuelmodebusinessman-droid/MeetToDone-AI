<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude AI Chat - Puter.js</title>
    <!-- Script Puter.js -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        /* Reset et base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Container principal */
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0F766E 0%, #134E4A 100%);
            color: white;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-icon {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* Toggle streaming */
        .streaming-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #F59E0B;
        }

        .toggle-slider {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(24px);
        }

        /* Zone historique des messages */
        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #FAFAFA;
        }

        .message {
            margin-bottom: 15px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            margin-left: auto;
        }

        .message.assistant {
            margin-right: auto;
        }

        .message-bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #0F766E 0%, #134E4A 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .message-time {
            font-size: 0.75rem;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }

        .message.assistant .message-time {
            text-align: left;
        }

        /* Indicateur de chargement */
        .loading {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 15px 20px;
            color: #0F766E;
            font-size: 0.9rem;
        }

        .loading.active {
            display: flex;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 8px;
            height: 8px;
            background: #0F766E;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Message d'erreur */
        .error-message {
            display: none;
            background: #FEE2E2;
            border: 1px solid #FCA5A5;
            color: #DC2626;
            padding: 12px 18px;
            border-radius: 12px;
            margin: 10px 20px;
            font-size: 0.9rem;
        }

        .error-message.active {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Zone de saisie */
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .prompt-textarea {
            flex: 1;
            min-height: 60px;
            max-height: 150px;
            padding: 15px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .prompt-textarea:focus {
            border-color: #0F766E;
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }

        .send-button {
            height: 60px;
            padding: 0 25px;
            background: linear-gradient(135deg, #0F766E 0%, #134E4A 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .send-button svg {
            width: 20px;
            height: 20px;
        }

        /* Bouton nouvelle conversation */
        .new-chat-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Message vide */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .chat-container {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
            }

            body {
                padding: 0;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .message {
                max-width: 90%;
            }

            .send-button {
                padding: 0 15px;
            }

            .send-button span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header avec titre et toggle streaming -->
        <div class="header">
            <h1>
                <div class="header-icon">🤖</div>
                Claude AI Chat
            </h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="new-chat-btn" onclick="clearChat()">Nouvelle conversation</button>
                <div class="streaming-toggle">
                    <span>Streaming</span>
                    <div class="toggle-switch" id="streamingToggle" onclick="toggleStreaming()">
                        <div class="toggle-slider"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Zone d'affichage des messages -->
        <div class="chat-history" id="chatHistory">
            <div class="empty-state" id="emptyState">
                <div class="empty-state-icon">💬</div>
                <h3>Bienvenue !</h3>
                <p>Envoyez un message à Claude 3.5 Sonnet pour commencer la conversation.</p>
            </div>
        </div>

        <!-- Indicateur de chargement -->
        <div class="loading" id="loadingIndicator">
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span>Claude réfléchit...</span>
        </div>

        <!-- Message d'erreur -->
        <div class="error-message" id="errorMessage"></div>

        <!-- Zone de saisie -->
        <div class="input-area">
            <div class="input-container">
                <textarea 
                    class="prompt-textarea" 
                    id="promptInput" 
                    placeholder="Écrivez votre message ici..."
                    onkeydown="handleKeyDown(event)"
                ></textarea>
                <button class="send-button" id="sendButton" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    <span>Envoyer</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // État de l'application
        let isStreaming = false;
        let isLoading = false;
        let chatHistory = [];

        // Référence aux éléments DOM
        const promptInput = document.getElementById('promptInput');
        const chatHistoryDiv = document.getElementById('chatHistory');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorMessage = document.getElementById('errorMessage');
        const emptyState = document.getElementById('emptyState');
        const streamingToggle = document.getElementById('streamingToggle');
        const sendButton = document.getElementById('sendButton');

        /**
         * Active/Désactive le mode streaming
         */
        function toggleStreaming() {
            isStreaming = !isStreaming;
            streamingToggle.classList.toggle('active', isStreaming);
        }

        /**
         * Gestion de la touche Entrée (Envoi avec Ctrl+Entrée ou Entrée seul)
         */
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        /**
         * Affiche un message d'erreur
         */
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
            setTimeout(() => {
                errorMessage.classList.remove('active');
            }, 5000);
        }

        /**
         * Défilement automatique vers le bas
         */
        function scrollToBottom() {
            chatHistoryDiv.scrollTop = chatHistoryDiv.scrollHeight;
        }

        /**
         * Ajoute un message à l'historique d'affichage
         */
        function addMessageToDisplay(role, content, isStreaming = false) {
            // Masquer l'état vide si c'est le premier message
            if (emptyState) {
                emptyState.style.display = 'none';
            }

            // Si c'est un message en streaming, mettre à jour le dernier message
            if (isStreaming && chatHistory.length > 0) {
                const lastMessage = chatHistoryDiv.lastElementChild;
                if (lastMessage && lastMessage.classList.contains('assistant')) {
                    const bubble = lastMessage.querySelector('.message-bubble');
                    bubble.textContent = content;
                    scrollToBottom();
                    return;
                }
            }

            // Créer un nouveau message
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = content;
            
            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = new Date().toLocaleTimeString('fr-FR', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            messageDiv.appendChild(bubble);
            messageDiv.appendChild(time);
            chatHistoryDiv.appendChild(messageDiv);
            
            scrollToBottom();
        }

        /**
         * Envoie un message à Claude via Puter.js
         */
        async function sendMessage() {
            const prompt = promptInput.value.trim();
            
            if (!prompt || isLoading) return;

            // Réinitialiser l'erreur
            errorMessage.classList.remove('active');

            // Ajouter le message utilisateur à l'affichage
            addMessageToDisplay('user', prompt);
            chatHistory.push({ role: 'user', content: prompt });

            // Vider le champ de saisie
            promptInput.value = '';
            promptInput.style.height = 'auto';

            // Activer l'indicateur de chargement
            isLoading = true;
            loadingIndicator.classList.add('active');
            sendButton.disabled = true;

            try {
                if (isStreaming) {
                    // VERSION AVEC STREAMING
                    await sendWithStreaming(prompt);
                } else {
                    // VERSION SANS STREAMING
                    await sendWithoutStreaming(prompt);
                }
            } catch (error) {
                console.error('Erreur:', error);
                showError('Une erreur est survenue : ' + (error.message || 'Impossible de contacter Claude'));
            } finally {
                isLoading = false;
                loadingIndicator.classList.remove('active');
                sendButton.disabled = false;
            }
        }

        /**
         * Version sans streaming - réponse complète d'un coup
         */
        async function sendWithoutStreaming(prompt) {
            const response = await puter.ai.chat(prompt, {
                model: 'claude-3-5-sonnet'
            });

            // Vérifier si la réponse contient du texte
            const content = response.message?.content || response;
            
            addMessageToDisplay('assistant', content);
            chatHistory.push({ role: 'assistant', content: content });
        }

        /**
         * Version avec streaming - réponse progressive
         */
        async function sendWithStreaming(prompt) {
            // Créer un message vide pour le streaming
            addMessageToDisplay('assistant', '');
            
            let fullContent = '';

            // Appel avec streaming activé
            const stream = await puter.ai.chat(prompt, {
                model: 'claude-3-5-sonnet',
                stream: true
            });

            // Traiter le flux de données
            for await (const chunk of stream) {
                const content = chunk.message?.content || chunk;
                fullContent += content;
                
                // Mettre à jour le dernier message avec le contenu accumulé
                addMessageToDisplay('assistant', fullContent, true);
            }

            // Sauvegarder le message complet dans l'historique
            chatHistory.push({ role: 'assistant', content: fullContent });
        }

        /**
         * Efface la conversation et recommence à zéro
         */
        function clearChat() {
            chatHistory = [];
            chatHistoryDiv.innerHTML = `
                <div class="empty-state" id="emptyState">
                    <div class="empty-state-icon">💬</div>
                    <h3>Bienvenue !</h3>
                    <p>Envoyez un message à Claude 3.5 Sonnet pour commencer la conversation.</p>
                </div>
            `;
            errorMessage.classList.remove('active');
        }

        // Auto-resize du textarea
        promptInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
    </script>
</body>
</html>
